<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KLMG StreamLink Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <div>
        <h1>KLMG StreamLink</h1>
        <p>Minimal dashboard for stream management and health monitoring.</p>
      </div>
      <div class="header-stats">
        <div><strong>Total Players</strong><span id="stat-total">0</span></div>
        <div><strong>Live</strong><span id="stat-live">0</span></div>
        <div><strong>Offline</strong><span id="stat-offline">0</span></div>
        <div><strong>Avg Latency</strong><span id="stat-latency">—</span></div>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="create-panel">
          <div>
            <label>Player Name</label>
            <input id="new-player-name" placeholder="Player 01" />
          </div>
          <div>
            <label>Team (optional)</label>
            <input id="new-player-team" placeholder="Team Alpha" />
          </div>
          <button id="create-player">Create Player</button>
        </div>

        <div id="player-list" class="grid"></div>
      </section>
    </main>
  </div>

  <template id="player-card-template">
    <div class="card">
      <div class="card-header">
        <div>
          <div class="player-title"><span class="player-name"></span></div>
          <div class="player-subtitle"><span class="player-team"></span></div>
        </div>
        <div class="status-dot offline"><span class="status-label">OFFLINE</span></div>
      </div>
      <div class="card-body">
        <div class="metrics-row">
          <div><strong>Quality</strong>
            <select class="quality-select">
              <option value="standard">Standard</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div><strong>Resolution</strong><span class="metric resolution">—</span></div>
          <div><strong>FPS</strong><span class="metric fps">—</span></div>
          <div><strong>Bitrate</strong><span class="metric bitrate">—</span></div>
          <div><strong>Latency</strong><span class="metric latency">—</span></div>
        </div>
        <div class="metrics-row">
          <div><strong>Packet Loss</strong><span class="metric packet-loss">—</span></div>
          <div><strong>Runtime</strong><span class="metric runtime">—</span></div>
        </div>
        <div class="links-row">
          <div>
            <label>Stream Link</label>
            <input class="link-field stream-link" readonly />
          </div>
          <div>
            <label>Viewer Link</label>
            <input class="link-field viewer-link" readonly />
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="copy-btn" data-copy="stream">Copy Stream</button>
        <button class="copy-btn" data-copy="viewer">Copy Viewer</button>
        <button class="reset-btn">Reset Stream</button>
        <button class="delete-btn">Delete Player</button>
      </div>
    </div>
  </template>

  <script src="/app.js"></script>
</body>
</html>
