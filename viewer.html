<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC Viewer</title>
  <style>
    body { margin: 0; background: black; color: #000; }
    main { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: black; }
    video { width: 100%; height: 100%; object-fit: contain; background: black; }
  </style>
</head>
<body>
  <main>
    <video id="video" autoplay playsinline></video>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const pathParts = location.pathname.split('/').filter(Boolean);
    const streamIdFromPath = pathParts.length > 1 && pathParts[0] === 'view' ? pathParts[1] : null;
    const streamId = params.get('stream') || streamIdFromPath || 'default';
    const videoEl = document.getElementById('video');

    function setStatus(text) {
      console.log(text);
    }

    function createUUID() {
      return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
      );
    }

    async function start() {
      const id = createUUID();
      const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws?role=viewer&stream=${encodeURIComponent(streamId)}&id=${encodeURIComponent(id)}`;
      const ws = new WebSocket(wsUrl);
      const turnUrl = new URLSearchParams(location.search).get('turn') || '';
      const turnUsername = new URLSearchParams(location.search).get('turnUser') || '';
      const turnPassword = new URLSearchParams(location.search).get('turnPass') || '';
      const iceServers = [{urls: ['stun:stun.l.google.com:19302']}];
      if (turnUrl) {
        iceServers.push({urls: [turnUrl], username: turnUsername, credential: turnPassword});
      }
      const pc = new RTCPeerConnection({iceServers});

      pc.ontrack = event => {
        videoEl.srcObject = event.streams[0];
        setStatus('Receiving stream');
      };

      pc.oniceconnectionstatechange = () => {
        setStatus('ICE state: ' + pc.iceConnectionState);
      };

      pc.onconnectionstatechange = () => {
        setStatus('Connection state: ' + pc.connectionState);
      };

      ws.onopen = async () => {
        setStatus('Connected to signaling server');
        pc.addTransceiver('video', {direction: 'recvonly'});
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({type: 'offer', stream_id: streamId, payload: {sdp: offer.sdp}}));
      };

      ws.onmessage = async event => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'answer' && msg.payload?.sdp) {
          await pc.setRemoteDescription({type: 'answer', sdp: msg.payload.sdp});
          setStatus('Remote description set');
          return;
        }
        if (msg.type === 'ice-candidate' && msg.payload?.candidate) {
          try {
            await pc.addIceCandidate({
              candidate: msg.payload.candidate,
              sdpMid: msg.payload.sdpMid,
              sdpMLineIndex: msg.payload.sdpMLineIndex
            });
          } catch (err) {
            console.warn('Failed to add remote ICE candidate', err);
          }
          return;
        }
      };

      ws.onerror = event => {
        setStatus('Signaling error');
        console.error(event);
      };

      ws.onclose = () => {
        setStatus('Signaling connection closed');
      };

      pc.onicecandidate = event => {
        if (event.candidate && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'ice-candidate',
            payload: {
              candidate: event.candidate.candidate,
              sdpMid: event.candidate.sdpMid,
              sdpMLineIndex: event.candidate.sdpMLineIndex
            }
          }));
        }
      };
    }

    start().catch(err => {
      console.error(err);
      setStatus('Startup error: ' + err.message);
    });
  </script>
</body>
</html>
