<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC Viewer</title>
  <style>
    body { margin: 0; background: black; color: #000; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
    main { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: black; position: relative; }
    video { width: 100%; height: 100%; object-fit: contain; background: black; }
    #unmute-btn {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: background 0.2s, transform 0.1s;
    }
    #unmute-btn:hover { background: rgba(0, 0, 0, 0.8); }
    #unmute-btn:active { transform: scale(0.95); }
    #unmute-btn svg { width: 24px; height: 24px; fill: white; }
  </style>
</head>
<body>
  <main>
    <div id="debug-info" style="position: absolute; top: 16px; left: 16px; background: rgba(0,0,0,0.85); color: #10b981; padding: 10px 14px; font-family: monospace; font-size: 12px; z-index: 100; pointer-events: none; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); line-height: 1.5; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
      Connection: Connecting...<br/>
      Video Track: INACTIVE<br/>
      Audio Track: INACTIVE
    </div>
    <video id="video" autoplay playsinline muted controls style="border-radius: 8px; max-width: 95%; max-height: 95%; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);"></video>
    <div id="unmute-btn" onclick="toggleMute()">
      <svg id="mute-icon" viewBox="0 0 24 24">
        <!-- Muted Icon by default (speaker with slash) -->
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
      </svg>
    </div>
  </main>
  <script>
    let hasVideo = false;
    let hasAudio = false;
    let currentConnectionState = 'Connecting...';

    function updateDebugHUD() {
      document.getElementById('debug-info').innerHTML = `
        Connection: <span style="color: ${currentConnectionState === 'connected' ? '#34d399' : '#fb7185'}">${currentConnectionState}</span><br/>
        Video Track: <span style="color: ${hasVideo ? '#34d399' : '#94a3b8'}">${hasVideo ? 'ACTIVE' : 'INACTIVE'}</span><br/>
        Audio Track: <span style="color: ${hasAudio ? '#34d399' : '#94a3b8'}">${hasAudio ? 'ACTIVE' : 'INACTIVE'}</span>
      `;
    }

    const params = new URLSearchParams(location.search);
    const pathParts = location.pathname.split('/').filter(Boolean);
    const streamIdFromPath = pathParts.length > 1 && pathParts[0] === 'view' ? pathParts[1] : null;
    const streamId = params.get('stream') || streamIdFromPath || 'default';
    const videoEl = document.getElementById('video');

    function setStatus(text) {
      console.log(text);
    }

    function createUUID() {
      return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
      );
    }

    function toggleMute() {
      videoEl.muted = !videoEl.muted;
      const icon = document.getElementById('mute-icon');
      if (videoEl.muted) {
        icon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
      } else {
        icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
      }
    }

    async function start() {
      const id = createUUID();
      const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws?role=viewer&stream=${encodeURIComponent(streamId)}&id=${encodeURIComponent(id)}`;
      const ws = new WebSocket(wsUrl);
      const turnUrl = new URLSearchParams(location.search).get('turn') || 'turn:129.154.41.124:3478';
      const turnUsername = new URLSearchParams(location.search).get('turnUser') || 'klmg';
      const turnPassword = new URLSearchParams(location.search).get('turnPass') || 'pass123';
      const iceServers = [{urls: ['stun:stun.l.google.com:19302']}];
      if (turnUrl) {
        iceServers.push({urls: [turnUrl], username: turnUsername, credential: turnPassword});
      }
      const pc = new RTCPeerConnection({iceServers});

      pc.ontrack = event => {
        if (event.track.kind === 'video') hasVideo = true;
        if (event.track.kind === 'audio') hasAudio = true;
        updateDebugHUD();

        if (videoEl.srcObject !== event.streams[0]) {
          videoEl.srcObject = event.streams[0];
          videoEl.muted = true;
          videoEl.play().catch(err => console.warn('Autoplay failed', err));
        }
        setStatus('Receiving stream: ' + event.track.kind);
      };

      pc.oniceconnectionstatechange = () => {
        setStatus('ICE state: ' + pc.iceConnectionState);
      };

      pc.onconnectionstatechange = () => {
        setStatus('Connection state: ' + pc.connectionState);
        currentConnectionState = pc.connectionState;
        updateDebugHUD();
      };

      ws.onopen = async () => {
        setStatus('Connected to signaling server');
        pc.addTransceiver('video', {direction: 'recvonly'});
        pc.addTransceiver('audio', {direction: 'recvonly'});
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({type: 'offer', stream_id: streamId, payload: {sdp: offer.sdp}}));
      };

      ws.onmessage = async event => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'answer' && msg.payload?.sdp) {
          await pc.setRemoteDescription({type: 'answer', sdp: msg.payload.sdp});
          setStatus('Remote description set');
          return;
        }
        if (msg.type === 'ice-candidate' && msg.payload?.candidate) {
          try {
            await pc.addIceCandidate({
              candidate: msg.payload.candidate,
              sdpMid: msg.payload.sdpMid,
              sdpMLineIndex: msg.payload.sdpMLineIndex
            });
          } catch (err) {
            console.warn('Failed to add remote ICE candidate', err);
          }
          return;
        }
      };

      ws.onerror = event => {
        setStatus('Signaling error');
        console.error(event);
      };

      ws.onclose = () => {
        setStatus('Signaling connection closed');
      };

      pc.onicecandidate = event => {
        if (event.candidate && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'ice-candidate',
            payload: {
              candidate: event.candidate.candidate,
              sdpMid: event.candidate.sdpMid,
              sdpMLineIndex: event.candidate.sdpMLineIndex
            }
          }));
        }
      };
    }

    start().catch(err => {
      console.error(err);
      setStatus('Startup error: ' + err.message);
    });
  </script>
</body>
</html>
