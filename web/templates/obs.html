<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>{{.Name}} - OBS multi-source</title>
<style>
  html,body{margin:0;padding:0;background:transparent;overflow:hidden;height:100%}
  #wrap{position:relative;width:100%;height:100%}
  video{width:100%;height:100%;object-fit:contain;background:#000}
  #label{position:absolute;left:12px;bottom:12px;padding:8px 12px;border-radius:6px;
         background:rgba(0,0,0,.7);color:#fff;font-family:system-ui,sans-serif;font-size:18px;z-index:100}
  #streamers{position:absolute;left:12px;top:12px;background:rgba(0,0,0,.7);border-radius:6px;padding:8px;z-index:100;max-width:300px}
  .streamer-btn{display:block;width:100%;padding:8px 12px;margin:4px 0;background:#4f7cff;color:#fff;border:none;border-radius:4px;
                cursor:pointer;font-size:14px;text-align:left;transition:background 0.2s}
  .streamer-btn:hover{background:#5a8aff}
  .streamer-btn.active{background:#ff7c4f}
  .streamer-btn .network{font-size:11px;opacity:0.8;margin-top:2px}
  #streamers.hidden{display:none}
  #label.hidden{display:none}
</style>
</head>
<body>
<div id="wrap">
  <video id="remote" autoplay playsinline></video>
  <div id="label">{{.Name}} - Select a stream</div>
  <div id="streamers">
    <div style="color:#fff;padding:4px;font-size:12px;margin-bottom:8px;">Available Streamers:</div>
    <div id="streamerList"></div>
  </div>
</div>

<script>
const roomID = "{{.ID}}";
const proto = location.protocol === "https:" ? "wss" : "ws";
const turnConfig = {{.TurnConfig | json}};
let ws, pc;
let currentStreamerID = null;
let streamers = {};

function connect(){
  ws = new WebSocket(`${proto}://${location.host}/ws?room=${roomID}&role=obs`);

  ws.onmessage = async (ev) => {
    const msg = JSON.parse(ev.data);
    console.log('OBS received:', msg);
    if(msg.type === 'streamer-list'){
      console.log('Got streamer list:', msg.streamerId);
      streamers[msg.streamerId] = msg.network;
      updateStreamerList();
    } else if(msg.type === 'streamer-joined'){
      console.log('Streamer joined:', msg.streamerId);
      streamers[msg.streamerId] = msg.network;
      updateStreamerList();
    } else if(msg.type === 'streamer-left'){
      delete streamers[msg.streamerId];
      if(currentStreamerID === msg.streamerId){
        currentStreamerID = null;
        document.getElementById('remote').srcObject = null;
        document.getElementById('label').textContent = '{{.Name}} - Streamer disconnected';
      }
      updateStreamerList();
    } else if(msg.type === 'offer' && msg.streamerId === currentStreamerID){
      console.log('Got offer from streamer:', msg.streamerId);
      await handleOffer(msg.sdp);
    } else if(msg.type === 'candidate' && msg.candidate && msg.streamerId === currentStreamerID){
      try{ await pc.addIceCandidate(msg.candidate); }catch(e){}
    }
  };

  ws.onclose = () => setTimeout(connect, 2000);
}

function updateStreamerList(){
  const listDiv = document.getElementById('streamerList');
  listDiv.innerHTML = '';
  if(Object.keys(streamers).length === 0){
    listDiv.innerHTML = '<div style="color:#aaa;font-size:12px;padding:4px;">Waiting for streamers...</div>';
    return;
  }
  for(const [streamerId, network] of Object.entries(streamers)){
    const btn = document.createElement('button');
    btn.className = 'streamer-btn' + (streamerId === currentStreamerID ? ' active' : '');
    btn.innerHTML = `<div>${streamerId.substring(0, 8)}</div><div class="network">${network === 'local' ? '🏠 Local' : '🌐 External'}</div>`;
    btn.onclick = () => selectStreamer(streamerId);
    listDiv.appendChild(btn);
  }
}

function selectStreamer(streamerId){
  if(currentStreamerID === streamerId) return;
  
  currentStreamerID = streamerId;
  updateStreamerList();
  
  // Send message to switch to this streamer
  if(ws && ws.readyState === WebSocket.OPEN){
    console.log('OBS selecting streamer:', streamerId);
    ws.send(JSON.stringify({type:'select-streamer', targetStreamerId: streamerId}));
  }
  
  document.getElementById('label').textContent = 'Connecting to: ' + streamerId.substring(0, 8);
}

async function handleOffer(sdp){
  try{
    if(pc) pc.close();
    
    const config = {
      iceServers: turnConfig.servers,
      bundlePolicy: 'max-bundle',
      rtcpMuxPolicy: 'require',
      iceTransportPolicy: 'all'
    };
    pc = new RTCPeerConnection(config);

    pc.ontrack = (ev) => {
      console.log('Received track:', ev.track.kind);
      document.getElementById('remote').srcObject = ev.streams[0];
      document.getElementById('label').textContent = 'Connected: ' + currentStreamerID.substring(0, 8);
    };

    pc.onicecandidate = (ev) => {
      if(ev.candidate) ws.send(JSON.stringify({type:'candidate', candidate: ev.candidate, streamerId: currentStreamerID}));
    };

    pc.onconnectionstatechange = () => {
      console.log('OBS Connection state:', pc.connectionState);
      if (pc.connectionState === 'failed') {
        document.getElementById('label').textContent = 'Connection failed - retrying...';
      }
    };

    pc.onicegatheringstatechange = () => {
      console.log('ICE gathering state:', pc.iceGatheringState);
    };

    await pc.setRemoteDescription(new RTCSessionDescription(sdp));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    ws.send(JSON.stringify({type:'answer', sdp: pc.localDescription, targetStreamerId: currentStreamerID}));
  }catch(e){
    console.error('Error in handleOffer:', e);
    document.getElementById('label').textContent = 'Connection error: ' + e.message;
  }
}

connect();
</script>
</body>
</html>
